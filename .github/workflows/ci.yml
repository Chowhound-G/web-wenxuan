# 元气购电商平台 CI/CD 流水线
#
# 触发：push 到 main / 任意 Pull Request
# 流水线：
#   1. backend-test    — 后端 Maven 构建 + 单元测试（纯 Mockito，零外部依赖）
#   2. build-images    — 构建前后端 Docker 镜像并推送 GHCR（依赖测试通过）
#   3. deploy          — SSH 部署到服务器（仅 push main 触发，依赖镜像构建）
#   4. notify-feishu   — 汇总 CI/CD 结果并发送飞书通知（配置 Webhook 后启用）
#
# 镜像仓库：GHCR (ghcr.io)，与 GitHub 原生集成，免费
# 部署方式：SSH 到服务器执行 docker pull + docker-compose up -d
#
# 需要 GitHub Secrets（部署相关，见 deploy/CD-SETUP.md）：
#   SERVER_HOST        服务器公网 IP
#   SERVER_USER        SSH 用户（如 root 或 deploy）
#   SSH_PRIVATE_KEY    SSH 私钥（对应服务器 authorized_keys 的公钥）
#   DEPLOY_PATH        服务器上项目路径（如 /opt/web-wenxuan）
#   FEISHU_BOT_WEBHOOK 飞书自定义机器人 Webhook（可选，用于通知）
#   FEISHU_BOT_SECRET  飞书自定义机器人签名密钥（可选，开启签名校验时填写）

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同分支新推送取消旧运行，省额度
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # 镜像名小写（GHCR 要求）。owner 含大写（如 Chowhound-G）会报错，需运行时转小写。
  # 这里用静态前缀，build-images job 内会算出小写 OWNER 并覆盖 IMAGE_PREFIX。
  IMAGE_PREFIX: ghcr.io/web-wenxuan

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: 后端构建 + 单元测试
  # ──────────────────────────────────────────────────────────────
  backend-test:
    name: 后端构建与测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17（与 Dockerfile 对齐）
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            back/target
          key: ${{ runner.os }}-maven-${{ hashFiles('back/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Maven 编译 + 测试（verify）
        run: mvn -B clean verify

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: back/target/surefire-reports
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────
  # Job 2: 构建并推送 Docker 镜像（依赖测试通过）
  # ──────────────────────────────────────────────────────────────
  build-images:
    name: 构建并推送镜像
    needs: backend-test
    runs-on: ubuntu-latest
    # 镜像 tag：main 分支用 latest + sha，PR 用 pr-<num>
    permissions:
      contents: read
      packages: write # 推送 GHCR 需要

    steps:
      - uses: actions/checkout@v4

      - name: 计算小写镜像名（GHCR 要求全小写）
        id: img
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${OWNER_LC}/web-wenxuan" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 内置 token，免配置

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./back
          push: true
          tags: ${{ steps.img.outputs.prefix }}-backend:latest,${{ steps.img.outputs.prefix }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 构建并推送前端镜像
        # context=仓库根，file=frontend/Dockerfile（COPY frontend/... + deploy/nginx.conf）
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.img.outputs.prefix }}-frontend:latest,${{ steps.img.outputs.prefix }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Job 3: 部署到服务器（仅 main 分支 push 触发）
  # 策略：compose 文件常驻服务器，CD 只做"拉镜像 + 重启"，更稳
  # 需 GitHub Secrets: SERVER_HOST, SERVER_PORT, SERVER_USER, SSH_PRIVATE_KEY, DEPLOY_PATH, COMPOSE_FILE
  # 需 GitHub Variable: ENABLE_DEPLOY=true 启用部署
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: 部署到服务器
    needs: build-images
    runs-on: ubuntu-latest
    # 仅 main 分支 push + 启用开关才部署；否则跳过（CI 保持绿色）
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.ENABLE_DEPLOY == 'true'
    environment:
      name: production

    steps:
      - name: SSH 拉镜像并重启服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            COMPOSE_FILE=${{ secrets.COMPOSE_FILE }}

            echo "📥 拉取最新镜像（--pull always）..."
            docker compose -f $COMPOSE_FILE pull backend frontend

            echo "🔄 重启 backend + frontend（mysql 不动，保数据）..."
            docker compose -f $COMPOSE_FILE up -d --no-deps backend frontend

            echo "🩺 健康检查..."
            sleep 15
            for i in 1 2 3 4 5 6; do
              code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/api/v1/products?page=1\&size=1 2>/dev/null || echo 000)
              if [ "$code" = "200" ]; then
                echo "✅ 后端就绪 (HTTP $code)"
                break
              fi
              echo "等待后端启动... HTTP $code"
              [ $i -eq 6 ] && { echo "❌ 后端 90s 内未就绪"; exit 1; }
              sleep 15
            done

            curl -s -o /dev/null -w '前端 HTTP %{http_code}\n' http://localhost/
            echo "🎉 部署完成: $(date)"

      - name: 部署失败时创建 Issue 告警
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 部署失败: ${context.sha.slice(0,7)}`,
              body: `部署到生产服务器失败，请检查。\n\n提交: ${context.payload.head_commit.message}\n运行: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['deployment', 'bug']
            })

  # ──────────────────────────────────────────────────────────────
  # Job 4: 飞书通知（可选）
  # 配置 GitHub Secrets: FEISHU_BOT_WEBHOOK, FEISHU_BOT_SECRET(可选)
  # ──────────────────────────────────────────────────────────────
  notify-feishu:
    name: 飞书通知
    needs: [backend-test, build-images, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 发送 CI/CD 结果到飞书
        env:
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
          BACKEND_RESULT: ${{ needs.backend-test.result }}
          BUILD_RESULT: ${{ needs.build-images.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          ENABLE_DEPLOY: ${{ vars.ENABLE_DEPLOY }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SERVER_URL: ${{ github.server_url }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || 'manual run' }}
          SITE_URL: http://019f2bb81c537b9083731be895602f96.ap-northeast-1.a8g1v3.xyz
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          webhook = os.getenv("FEISHU_BOT_WEBHOOK", "").strip()
          if not webhook:
              print("FEISHU_BOT_WEBHOOK is not configured; skip Feishu notification.")
              sys.exit(0)

          backend = os.getenv("BACKEND_RESULT", "unknown")
          build = os.getenv("BUILD_RESULT", "unknown")
          deploy = os.getenv("DEPLOY_RESULT", "unknown")
          enable_deploy = os.getenv("ENABLE_DEPLOY", "").lower() == "true"
          event_name = os.getenv("EVENT_NAME", "")
          ref_name = os.getenv("REF_NAME", "")
          deploy_expected = event_name == "push" and ref_name == "main" and enable_deploy

          ok = backend == "success" and build == "success"
          ok = ok and (deploy == "success" if deploy_expected else deploy in ("success", "skipped"))

          run_url = f"{os.getenv('SERVER_URL')}/{os.getenv('REPOSITORY')}/actions/runs/{os.getenv('RUN_ID')}"
          short_sha = os.getenv("SHA", "")[:7]
          title = "CI/CD 成功" if ok else "CI/CD 失败"
          status_icon = "SUCCESS" if ok else "FAILED"

          commit_message = os.getenv("COMMIT_MESSAGE", "").strip().splitlines()[0]
          if len(commit_message) > 120:
              commit_message = commit_message[:117] + "..."

          deploy_line = f"部署到服务器：{deploy}"
          if not deploy_expected and deploy == "skipped":
              deploy_line = "部署到服务器：skipped（当前触发条件不部署）"

          text = "\n".join([
              f"[{status_icon}] {title}",
              f"仓库：{os.getenv('REPOSITORY')}",
              f"工作流：{os.getenv('WORKFLOW')} #{os.getenv('RUN_NUMBER')}",
              f"分支：{ref_name}",
              f"触发：{event_name} / {os.getenv('ACTOR')}",
              f"提交：{short_sha} {commit_message}",
              "",
              f"后端构建与测试：{backend}",
              f"构建并推送镜像：{build}",
              deploy_line,
              "",
              f"运行详情：{run_url}",
              f"线上地址：{os.getenv('SITE_URL')}",
          ])

          payload = {
              "msg_type": "text",
              "content": {"text": text},
          }

          secret = os.getenv("FEISHU_BOT_SECRET", "").strip()
          if secret:
              timestamp = str(int(time.time()))
              string_to_sign = f"{timestamp}\n{secret}"
              sign = base64.b64encode(
                  hmac.new(string_to_sign.encode("utf-8"), digestmod=hashlib.sha256).digest()
              ).decode("utf-8")
              payload["timestamp"] = timestamp
              payload["sign"] = sign

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  body = resp.read().decode("utf-8", errors="replace")
                  print(body)
                  if resp.status >= 300:
                      raise RuntimeError(f"Feishu webhook HTTP {resp.status}: {body}")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              raise RuntimeError(f"Feishu webhook HTTP {exc.code}: {body}") from exc
          PY
